{% extends "base.html" %}
{% block title %}Playbook Positions — SCC{% endblock %}

{% block content %}
<div class="space-y-5">
  <div>
    <h2 class="text-xl font-bold">Active Option Positions</h2>
    <p class="text-sm text-slate-500 dark:text-slate-400">All open covered calls and strangles</p>
  </div>

  <!-- Positions Table -->
  <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden" data-privacy>
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b border-slate-100 dark:border-slate-800">
          <th class="text-left px-4 py-3 text-[10px] font-semibold text-slate-400 uppercase">Stock</th>
          <th class="text-left px-3 py-3 text-[10px] font-semibold text-slate-400 uppercase">Strategy</th>
          <th class="text-left px-3 py-3 text-[10px] font-semibold text-slate-400 uppercase">Legs</th>
          <th class="text-center px-3 py-3 text-[10px] font-semibold text-slate-400 uppercase">Entry</th>
          <th class="text-center px-3 py-3 text-[10px] font-semibold text-slate-400 uppercase">DTE</th>
          <th class="text-right px-3 py-3 text-[10px] font-semibold text-slate-400 uppercase">P&L</th>
          <th class="text-right px-3 py-3 text-[10px] font-semibold text-slate-400 uppercase">P&L %</th>
          <th class="text-center px-4 py-3 text-[10px] font-semibold text-slate-400 uppercase">Status</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-50 dark:divide-slate-800">
        <tr><td colspan="8" class="px-4 py-8 text-center text-slate-400">No active option positions yet. Run a scanner to find opportunities.</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
