{% extends "base.html" %}
{% block title %}Error — SCC{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
  <div class="text-center">
    <p class="text-4xl mb-4">⚠️</p>
    <h2 class="text-xl font-bold mb-2">{{ message or 'Page Not Found' }}</h2>
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">The page you're looking for doesn't exist or is still being built.</p>
    <a href="/" class="px-4 py-2 rounded-lg bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-sm font-semibold">Back to Dashboard</a>
  </div>
</div>
{% endblock %}
